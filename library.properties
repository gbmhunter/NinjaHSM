name=NinjaHSM
version=1.4.0
author=Geoff Hunter
maintainer=Geoff Hunter <gbmhunter@gmail.com>
sentence=A small, simple hierarchical state machine (HSM) library for embedded systems.
paragraph=Header-only hierarchical state machine with no dynamic memory allocation (uses ETL delegates). Supports entry/event/exit handlers, event bubbling to parent states, entry/exit guards, and optional transition/error observers. Depends on the Embedded Template Library (ETL).
