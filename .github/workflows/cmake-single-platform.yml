# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: CMake on a single platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DNINJAHSM_BUILD_TESTS=ON

    - name: Build tests
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Run tests
      working-directory: ${{github.workspace}}/build
      run: ./test/tests

    - name: Build examples
      working-directory: ${{github.workspace}}/examples/basic_example
      run: mkdir -p build && cd build && cmake .. && cmake --build . --config ${{env.BUILD_TYPE}}

    - name: Run examples
      working-directory: ${{github.workspace}}/examples/basic_example
      run: ./build/basic_example

  # Cross-compile the headers for a bare-metal ARM Cortex-M target to prove the embedded claim.
  cross-compile-arm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install ARM toolchain
      run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi

    - name: Configure (arm-none-eabi)
      run: cmake -B ${{github.workspace}}/build-arm -DCMAKE_TOOLCHAIN_FILE=${{github.workspace}}/cmake/arm-none-eabi.cmake -DNINJAHSM_BUILD_COMPILE_CHECK=ON

    - name: Compile for ARM
      run: cmake --build ${{github.workspace}}/build-arm

  # Verify the headers compile with C++ exceptions and RTTI disabled, as embedded builds often do.
  strict-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure (no exceptions, no RTTI)
      run: cmake -B ${{github.workspace}}/build-strict -DNINJAHSM_BUILD_COMPILE_CHECK=ON -DCMAKE_CXX_FLAGS="-fno-exceptions -fno-rtti"

    - name: Compile (strict)
      run: cmake --build ${{github.workspace}}/build-strict

  # Validate the Conan recipe end-to-end: build the package and consume it via test_package.
  conan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Conan
      run: pip install "conan>=2.0"

    - name: Detect profile
      run: conan profile detect --force

    - name: Create package (builds and runs test_package)
      run: conan create . --build=missing


